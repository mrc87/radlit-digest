# Your journal list — customized for Interventional Radiology.
# To add a journal later: copy a block, change the name, pubmed_ta, and open_access flag.
# `pubmed_ta` is the official PubMed "Title Abbreviation" — find it at
# https://www.ncbi.nlm.nih.gov/nlmcatalog by searching the journal name.

lookback_days: 366          # fetch a rolling year so the date-range buttons have data
max_articles_per_journal: 400   # safety cap
max_summaries_per_run: 60       # cap on Gemini calls per run (not currently used — no auto-summaries)

# EZproxy disabled — all links are direct DOI / PubMed links.
# ezproxy_prefix: ""

journals:
  # --- Core IR journals ---

  - name: "Journal of Vascular and Interventional Radiology (JVIR)"
    pubmed_ta: "J Vasc Interv Radiol"
    open_access: false       # subscription — abstract + deep link to full text

  - name: "CardioVascular and Interventional Radiology (CVIR)"
    pubmed_ta: "Cardiovasc Intervent Radiol"
    open_access: false

  - name: "Techniques in Vascular and Interventional Radiology"
    pubmed_ta: "Tech Vasc Interv Radiol"
    open_access: false

  - name: "Seminars in Interventional Radiology"
    pubmed_ta: "Semin Intervent Radiol"
    open_access: false

  - name: "Diagnostic and Interventional Radiology"
    pubmed_ta: "Diagn Interv Radiol"
    open_access: true        # OA — full-text summaries and figures available

  # --- Broad radiology journals with IR filter ---
  # filter: "ir" keeps only interventional/procedural articles and hides the rest.
  # The IR filter is defined in digest.py (IR_MESH + IR_KEYWORDS + is_ir_article).

  - name: "RadioGraphics"
    pubmed_ta: "Radiographics"
    open_access: false
    filter: "ir"

  - name: "Radiology"
    pubmed_ta: "Radiology"
    open_access: false
    filter: "ir"

  - name: "American Journal of Roentgenology (AJR)"
    pubmed_ta: "AJR Am J Roentgenol"
    open_access: false
    filter: "ir"
