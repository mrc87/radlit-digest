# YouTube channels to track, plus the topic list used to organize videos.
#
# To add a channel: add its handle URL under `channels`. The handle (the part
# after @) is the reliable identifier; the script resolves it to a channel ID.
#
# Topics: the script asks the LLM to file each educational video under ONE of
# these. Non-educational videos (vlogs, announcements, etc.) go to "Other".

lookback_days: 366
max_videos_per_channel: 200
max_classifications_per_run: 8   # cache makes classification a one-time cost per video.
                                  # Free tier: ~20 req/day, 5 req/min.

channels:
  - handle: "SIRspecialists"    # https://www.youtube.com/@SIRspecialists
    name: "Society of Interventional Radiology (SIR)"

  - handle: "CIRSEofficial"     # https://www.youtube.com/@CIRSEofficial
    name: "CIRSE"

topics:
  - "Embolization"
  - "Angioplasty & Stenting"
  - "TIPS & Portal Hypertension"
  - "Biliary"
  - "Oncologic Ablation"
  - "Venous & IVC"
  - "Genitourinary"
  - "Dialysis Access"
  - "Trauma & Hemorrhage"
  - "Vascular Malformations"
  - "Other"
